name: Update APT Repository

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-apt-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: sudo apt-get install -y dpkg-dev

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format LONG \
            | grep '^sec' | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Checkout or initialize gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          REPO_URL="https://x-access-token:$GH_TOKEN@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code "$REPO_URL" gh-pages; then
            git clone --depth 1 --branch gh-pages "$REPO_URL" apt-repo
          else
            mkdir apt-repo
            cd apt-repo
            git init
            git remote add origin "$REPO_URL"
            git checkout --orphan gh-pages
          fi

      - name: Download .deb packages from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "${{ github.event.release.tag_name }}" \
            --pattern "*.deb" \
            --dir apt-repo/

      - name: Generate Packages index
        run: |
          cd apt-repo
          dpkg-scanpackages --multiversion . > Packages
          gzip -k -f Packages

      - name: Generate Release file
        run: |
          cd apt-repo
          {
            echo "Origin: ws"
            echo "Label: ws"
            echo "Suite: stable"
            echo "Codename: stable"
            echo "Architectures: amd64 arm64"
            echo "Components: main"
            echo "Date: $(date -Ru)"
            echo "SHA256:"
            for f in Packages Packages.gz; do
              printf " %s %s %s\n" \
                "$(sha256sum "$f" | cut -d' ' -f1)" \
                "$(wc -c < "$f" | tr -d ' ')" \
                "$f"
            done
          } > Release

      - name: Sign Release with GPG
        run: |
          cd apt-repo
          gpg --batch --yes --default-key "$GPG_KEY_ID" \
            -abs -o Release.gpg Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" \
            --clearsign -o InRelease Release

      - name: Export GPG public key
        run: gpg --armor --export "$GPG_KEY_ID" > apt-repo/gpg.key

      - name: Commit and push
        run: |
          cd apt-repo
          git add .
          git diff --staged --quiet && echo "Nothing to commit" && exit 0
          git commit -m "APT repo update for ${{ github.event.release.tag_name }}"
          git push origin gh-pages
